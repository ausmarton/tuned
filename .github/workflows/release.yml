name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "ndk;26.2.11394342"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tuner-core

      - name: Decode signing keystore
        working-directory: tuner-android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed release APK
        working-directory: tuner-android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.2.11394342
        run: ./gradlew assembleRelease

      - name: Stage artifacts + checksum
        working-directory: tuner-android
        run: |
          apk=app/build/outputs/apk/release/app-release.apk
          out="opentuner-${{ github.ref_name }}.apk"
          cp "$apk" "$out"
          sha256sum "$out" > "$out.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tuner-android/opentuner-${{ github.ref_name }}.apk
            tuner-android/opentuner-${{ github.ref_name }}.apk.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
